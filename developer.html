<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>المطوّر الأعلى | MOON</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<style>
:root { --gold:#d4af37; --gold-glow:rgba(212,175,55,0.7); --purple:#7a3cf5; --cyan:#00f2fe; --cyan-glow:rgba(0,242,254,0.4); --bg-deep:#030108; --glass-border:rgba(255,255,255,0.08); --text:#e8e0f0; --text-dim:#9a8fb8; }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;color:var(--text);background:var(--bg-deep);min-height:100vh;overflow-x:hidden;}
#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(122,60,245,0.1),transparent),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(0,242,254,0.08),transparent);}

/* CINEMATIC */
#cinematic{position:fixed;inset:0;background:radial-gradient(circle,#0a0015,#030108);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;animation:cinematicFade 2.5s ease forwards;animation-delay:2.5s;}
#cinematic h1{font-family:'Cinzel Decorative',serif;font-size:clamp(28px,8vw,56px);color:var(--cyan);letter-spacing:8px;text-shadow:0 0 40px var(--cyan-glow),0 0 80px rgba(0,242,254,0.3);animation:introGlow 2s ease-in-out infinite alternate;}
@keyframes introGlow{from{text-shadow:0 0 30px var(--cyan-glow);}to{text-shadow:0 0 60px var(--cyan-glow),0 0 100px rgba(0,242,254,0.4);}}
#cinematic p{margin-top:15px;opacity:.8;font-size:clamp(12px,3vw,18px);letter-spacing:3px;}
@keyframes cinematicFade{to{opacity:0;visibility:hidden;}}

/* BG */
.bg-image{position:fixed;inset:0;background:url("Toji1.jfif") center/cover no-repeat;filter:blur(3px) brightness(.35) saturate(.7);z-index:0;}
.bg-overlay{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(3,1,8,0.6),var(--bg-deep));z-index:0;}

/* DEV */
.developer{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 15px;opacity:0;animation:fadeIn 1.5s ease forwards;animation-delay:3s;}
@keyframes fadeIn{to{opacity:1;}}
.title{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,5vw,34px);margin-bottom:30px;color:var(--cyan);text-align:center;text-shadow:0 0 25px var(--cyan-glow);padding:0 10px;}

/* CARD */
.dev-card{width:min(95%,420px);padding:clamp(22px,4vw,35px) clamp(18px,3vw,30px);text-align:center;border-radius:28px;background:rgba(12,8,24,0.65);backdrop-filter:blur(20px);border:1px solid var(--glass-border);box-shadow:0 0 50px rgba(0,242,254,0.15),0 30px 80px rgba(0,0,0,0.6);margin-bottom:20px;position:relative;overflow:hidden;}
.dev-card::before{content:"";position:absolute;inset:-2px;border-radius:inherit;background:conic-gradient(from 0deg,transparent,var(--cyan),transparent,var(--purple),transparent);opacity:.3;filter:blur(4px);z-index:-1;animation:borderSpin 10s linear infinite;}
@keyframes borderSpin{to{transform:rotate(360deg);}}

.dev-name{font-family:'Cinzel Decorative',serif;font-size:clamp(16px,4vw,22px);color:var(--gold);text-shadow:0 0 15px var(--gold-glow);margin-bottom:6px;}
.dev-role{margin:6px 0 16px;opacity:.85;font-size:clamp(13px,3vw,15px);letter-spacing:1px;}
.dev-info{list-style:none;margin-bottom:16px;}
.dev-info li{margin:8px 0;font-size:clamp(12px,2.8vw,14px);padding:10px 14px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);transition:all .3s;}
.dev-info li:hover,.dev-info li:active{background:rgba(0,242,254,0.06);border-color:rgba(0,242,254,0.2);transform:translateX(-4px);}

.contact{margin:16px 0;display:flex;flex-direction:column;gap:10px;}
.contact-link{text-decoration:none;color:var(--text);display:flex;justify-content:center;align-items:center;gap:10px;padding:10px 16px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);transition:all .4s;font-size:clamp(13px,3vw,14px);}
.contact-link i{color:var(--cyan);font-size:18px;}
.contact-link:hover,.contact-link:active{background:rgba(0,242,254,0.08);border-color:rgba(0,242,254,0.25);transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,242,254,0.15);}

.power-btn{margin-top:16px;padding:10px 24px;border:none;border-radius:16px;cursor:pointer;color:#030108;font-weight:900;font-size:clamp(13px,3vw,15px);font-family:'Cairo',sans-serif;background:linear-gradient(135deg,var(--gold),#f1d27a);box-shadow:0 0 20px rgba(212,175,55,0.3);transition:all .4s;-webkit-tap-highlight-color:transparent;}
.power-btn:hover,.power-btn:active{transform:translateY(-3px) scale(1.05);box-shadow:0 0 40px rgba(212,175,55,0.6);}

#power{margin-top:16px;font-size:clamp(13px,3.5vw,18px);color:var(--gold);text-shadow:0 0 25px var(--gold-glow);min-height:24px;}
#power.show{animation:powerReveal .8s ease-out;}
@keyframes powerReveal{from{opacity:0;transform:translateY(20px) scale(.8);}to{opacity:1;transform:translateY(0) scale(1);}}

.back{display:inline-block;margin-top:25px;padding:10px 26px;border-radius:30px;border:1px solid rgba(0,242,254,0.3);color:var(--cyan);text-decoration:none;font-weight:700;font-size:clamp(13px,3vw,14px);background:rgba(0,242,254,0.05);transition:all .4s;}
.back:hover{background:var(--cyan);color:#030108;box-shadow:0 0 25px var(--cyan-glow);}

.developer-badge{position:fixed;bottom:20px;left:20px;background:rgba(3,1,8,0.7);backdrop-filter:blur(12px);border:1px solid rgba(0,242,254,0.2);padding:7px 14px;border-radius:14px;display:flex;align-items:center;gap:8px;z-index:999;cursor:pointer;text-decoration:none;transition:all .4s;}
.developer-badge:hover{transform:translateY(-4px) scale(1.05);border-color:var(--cyan);box-shadow:0 0 20px rgba(0,242,254,0.3);}
.developer-badge .text{font-size:10px;color:#fff;font-weight:700;letter-spacing:1.5px;font-family:'Cinzel Decorative',serif;}
.developer-badge .code-icon{color:var(--cyan);font-weight:900;font-family:monospace;font-size:13px;animation:blink 2s infinite;}
@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0;}}

.shake{animation:screenShake .3s;}
@keyframes screenShake{0%{transform:translate(0,0);}25%{transform:translate(5px,0);}50%{transform:translate(-5px,0);}75%{transform:translate(5px,0);}100%{transform:translate(0,0);}}

@media(max-width:480px){
    .developer-badge{bottom:14px;left:14px;padding:5px 10px;}
    .developer-badge .text{font-size:8px;}
}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<div id="cinematic"><h1>MOON</h1><p>⚜️ النظام يولد… ⚙️ المطوّر يحكم</p></div>
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<section class="developer">
    <h1 class="title">⚜️ المطوّر الأعلى للاقليم ⚜️</h1>
    <div class="dev-card">
        <h2 class="dev-name">👑 𝑲𝒂𝒊𝒓𝒐 – 𝑻𝒐𝒋𝒊 ⛧</h2>
        <p class="dev-role">مشرف &amp; مطوّر نظام الاقليم</p>
        <ul class="dev-info">
            <li>⚙️ هندسة الأنظمة</li>
            <li>🛡️ تدريب المشرفين</li>
            <li>🔥 بناء العوالم الإدارية</li>
            <li>👁️ مراقبة التوازن</li>
        </ul>
        <div class="contact">
            <a href="https://wa.me/821046715446" target="_blank" class="contact-link"><i class="fa-brands fa-whatsapp"></i><span>+82 1046715446</span></a>
            <a href="https://www.instagram.com/mohammede_elmorsli" target="_blank" class="contact-link"><i class="fa-brands fa-instagram"></i><span>Mohamed</span></a>
        </div>
        <button class="power-btn" onclick="showPower()">⚡ كشف الهيبة</button>
        <p id="power"></p>
    </div>
    <a href="index.html" class="back">⬅ الرجوع للمملكة</a>
</section>

<a href="#" class="developer-badge"><span class="text">𝑲𝒂𝒊𝒓𝒐 – 𝑻𝒐𝒋𝒊 ⛧</span><span class="code-icon">&lt;/&gt;</span></a>

<script>
(function(){const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let w,h,stars=[];const N=innerWidth<768?80:150;function resize(){w=c.width=innerWidth;h=c.height=innerHeight;}function create(){stars=[];for(let i=0;i<N;i++)stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.3,speed:Math.random()*0.2+0.03,phase:Math.random()*Math.PI*2});}function draw(t){ctx.clearRect(0,0,w,h);stars.forEach(s=>{s.y-=s.speed;if(s.y<-5){s.y=h+5;s.x=Math.random()*w;}const tw=0.5+0.5*Math.sin(t*0.002+s.phase);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${tw*0.7})`;ctx.fill();});requestAnimationFrame(draw);}addEventListener('resize',()=>{resize();create();});resize();create();requestAnimationFrame(draw);})();

function showPower(){
    const powers=["👑 العقل المدبر للقمر","🔥 مطور النظام الأعلى","⚙️ سيد الأكواد","🛡️ حارس التوازن","☠️ من يتحكم في النظام… يتحكم في المصير"];
    const el=document.getElementById("power");
    el.innerText=powers[Math.floor(Math.random()*powers.length)];
    el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
    document.body.classList.add("shake");setTimeout(()=>document.body.classList.remove("shake"),300);
}
</script>
</body>
</html>
