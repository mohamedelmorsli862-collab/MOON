<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إنجازات الاقليم</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Tahoma;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow-x:hidden;
  background:radial-gradient(circle at bottom,#1b2735 0%,#090a0f 100%);
  color:white;
}

/* Navbar */


/* القمر */
.moon{
  position: fixed; /* يبقى مع الخلفية */
  top: 10%;
  right: 5%;
  width: 120px;
  height: 120px;
  background:#fffdd0;
  border-radius:50%;
  box-shadow:
    0 0 40px #fff,
    0 0 80px #fff,
    0 0 120px #fff;
  z-index:0; /* تحت كلشي */
}

/* النجوم */
.stars{
  position:absolute;
  width:100%;
  height:100%;
  background:transparent;
}

.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  animation:moveStars 10s linear infinite, twinkle 2s infinite;
}

@keyframes moveStars{
  from{transform:translateY(0)}
  to{transform:translateY(-100vh)}
}

@keyframes twinkle{
  0%{opacity:0.2}
  50%{opacity:1}
  100%{opacity:0.2}
}

/* كارت الإنجازات */
.story{
  position: relative;
  z-index:2; /* فوق القمر */
  width:90%;
  max-width:750px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(12px);
  padding:40px;
  border-radius:25px;
  box-shadow:
    0 0 25px rgba(255,255,255,0.2),
    0 0 60px rgba(100,80,255,0.6);
}

.story h1{
  text-align:center;
  margin-bottom:30px;
  font-size:32px;
  text-shadow:0 0 15px #aaa;
}

/* الإنجازات */
.achievement{
  padding:15px;
  margin:12px 0;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  font-size:20px;
  opacity:0;
  transform:translateY(30px);
  animation:show 1s forwards;
}

.achievement:nth-child(2){animation-delay:0.5s;}
.achievement:nth-child(3){animation-delay:1s;}
.achievement:nth-child(4){animation-delay:1.5s;}
.achievement:nth-child(5){animation-delay:2s;}
.achievement:nth-child(6){animation-delay:2.5s;}

.achievement:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.15);
  box-shadow:0 0 20px #aaa;
}

/* Glow للأيقونات */
.achievement span{
  filter:drop-shadow(0 0 6px #fff);
}

/* animation الإنجازات */
@keyframes show{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Responsive */
@media (max-width:768px){
  .moon{
    top:5%;
    right:5%;
    width:70px;
    height:70px;
  }
  .story{
    width:95%;
    padding:25px;
  }
  .story h1{
    font-size:26px;
  }
  .achievement{
    font-size:18px;
  }
}
/* القمر فوق الكارت */
.moon{
  position: absolute; /* بدل fixed باش يجي فوق الكارت */
  top: 0px; /* يطلع فوق الكارت */
  right: 20px;
  width: 100px;
  height: 100px;
   background:#fffdd0;
  border-radius:50%;
  box-shadow:
    0 0 40px #fff,
    0 0 80px #fff,
    0 0 120px #fff;
  z-index:3;
}

/* Button العودة – تصميم خرافي */
.back{
  display:inline-block;
  margin-top:25px;
  padding:12px 30px;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
  font-size:clamp(14px,4vw,18px);
  background: linear-gradient(45deg,#ffd700,#ffae00);
  color:#000;
  box-shadow:0 0 10px #ffd700,0 0 20px #ffae00;
  transition:0.4s;
}

.back:hover{
  transform:scale(1.05) rotate(-2deg);
  box-shadow:0 0 20px #fffdd0,0 0 40px #ffd700;
}
</style>
</head>

<body>
<!-- Navbar -->


<!-- القمر -->
<div class="moon"></div>

<!-- النجوم -->
<div class="stars">
  <div class="star" style="top:10%;left:20%"></div>
  <div class="star" style="top:30%;left:70%"></div>
  <div class="star" style="top:50%;left:10%"></div>
  <div class="star" style="top:80%;left:60%"></div>
  <div class="star" style="top:20%;left:50%"></div>
  <div class="star" style="top:60%;left:40%"></div>
  <div class="star" style="top:75%;left:25%"></div>
</div>

<!-- كارت الإنجازات -->
<div class="story">
<h1>إنجازات الاقليم 🌙</h1>

<div class="achievement">❍ <span>9</span> نقابات نشطة</div>
<div class="achievement">❍ فوز دريفت <span>🎻</span> بالمركز الثالث في بطولة صراع نشر أريفانيا <span>🪽</span></div>
<div class="achievement">❍ تأهل <span>6</span> نقابات من الإقليم للدور الثاني من بطولة حرب أريفانيا <span>🪽</span></div>
<div class="achievement">❍ فوز وانو <span>🎋</span> بأنظف تفاعل ببطولة حرب أريفانيا <span>🪽</span></div>
<div class="achievement">❍ فوز دريفت <span>🎻</span> بأكثر نقابة متفاعلة ببطولة حرب أريفانيا <span>🪽</span></div>

<a href="index.html" class="back">⬅ الرجوع الاقليم</a>
</div>


</body>
</html>
