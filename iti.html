<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>نقابات اثي | MOON</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<style>
:root { --gold:#d4af37; --gold-glow:rgba(212,175,55,0.7); --purple:#7a3cf5; --cyan:#00f2fe; --cyan-glow:rgba(0,242,254,0.4); --bg-deep:#030108; --glass-border:rgba(255,255,255,0.08); --text:#e8e0f0; --text-dim:#9a8fb8; }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;color:var(--text);background:var(--bg-deep);min-height:100vh;overflow-x:hidden;padding-top:70px;}
#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(122,60,245,0.12),transparent),radial-gradient(ellipse 60% 50% at 80% 90%,rgba(0,242,254,0.08),transparent);}
.nav{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 4%;height:70px;display:flex;align-items:center;justify-content:space-between;background:rgba(3,1,8,0.75);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid rgba(212,175,55,0.15);animation:navSlide 1s cubic-bezier(.25,1,.5,1) forwards;transform:translateY(-100%);}
@keyframes navSlide{to{transform:translateY(0);}}
.nav-brand{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:900;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);letter-spacing:3px;display:flex;align-items:center;gap:8px;text-decoration:none;white-space:nowrap;}
.nav-brand .moon-icon{font-size:22px;animation:moonFloat 3s ease-in-out infinite;}
@keyframes moonFloat{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-4px) rotate(8deg);}}
.nav-link{padding:8px 18px;font-size:13px;font-weight:700;color:var(--text);text-decoration:none;border-radius:30px;border:1px solid rgba(212,175,55,0.2);background:rgba(212,175,55,0.06);transition:all .4s;position:relative;overflow:hidden;}
.nav-link::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--gold),#ff8c00);opacity:0;border-radius:inherit;transition:opacity .4s;z-index:-1;}
.nav-link:hover{color:#000;border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 25px rgba(212,175,55,0.35);}
.nav-link:hover::before{opacity:1;}
.page-title{position:relative;z-index:1;font-family:'Cinzel Decorative',serif;font-size:clamp(1.5rem,5vw,2.6rem);color:var(--gold);text-align:center;margin:40px 0;padding:0 15px;text-shadow:0 0 30px var(--gold-glow);animation:titleReveal 1.2s ease forwards;opacity:0;transform:translateY(30px);}
.page-title::after{content:"";display:block;width:80px;height:2px;margin:12px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
@keyframes titleReveal{to{opacity:1;transform:translateY(0);}}
.cards{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:30px;padding:0 4% 60px;perspective:1200px;}
.card{position:relative;height:320px;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border:1px solid var(--glass-border);transition:all .6s cubic-bezier(.25,1,.5,1);transform-style:preserve-3d;background:linear-gradient(to bottom,rgba(3,1,8,0.3),rgba(3,1,8,0.9)),var(--bg) no-repeat center/cover;opacity:0;transform:translateY(50px);box-shadow:0 15px 40px rgba(0,0,0,0.5);-webkit-tap-highlight-color:transparent;}
.card.visible{opacity:1;transform:translateY(0);}
.card::before{content:"";position:absolute;inset:-1px;border-radius:inherit;background:conic-gradient(from 0deg,transparent,var(--gold),transparent,var(--purple),transparent);opacity:0;transition:opacity .6s;z-index:0;filter:blur(3px);}
.card:hover::before,.card.touched::before{opacity:0.4;}
.card:hover,.card.touched{transform:translateY(-12px) scale(1.03);box-shadow:0 0 50px rgba(212,175,55,0.3),0 20px 50px rgba(0,0,0,0.5);}
.card h3{font-family:'Cinzel Decorative',serif;font-size:clamp(20px,4vw,26px);margin-bottom:8px;color:var(--gold);font-weight:900;text-shadow:0 0 15px var(--gold-glow),0 0 30px rgba(212,175,55,0.4);position:relative;z-index:2;}
.rank{position:absolute;top:16px;right:16px;font-size:10px;letter-spacing:2px;padding:5px 14px;color:var(--cyan);border:1px solid rgba(0,242,254,0.3);border-radius:20px;background:rgba(3,1,8,0.7);backdrop-filter:blur(8px);box-shadow:0 0 15px var(--cyan-glow);z-index:5;font-weight:700;}
.icon{font-size:26px;position:relative;z-index:2;filter:drop-shadow(0 0 10px rgba(255,255,255,0.3));}
.falling-icons{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.falling-icons span{position:absolute;font-size:18px;opacity:0.35;animation:fall linear infinite;}
@keyframes fall{0%{transform:translateY(-50px) rotate(0deg);opacity:0;}10%{opacity:0.4;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}
@media(max-width:480px){body{padding-top:56px;}.nav{padding:0 3%;height:56px;}.nav-brand{font-size:16px;}.cards{grid-template-columns:1fr;padding:0 3% 40px;gap:18px;}.card{height:270px;}.page-title{margin:30px 0;}}
@media(min-width:481px) and (max-width:768px){.cards{grid-template-columns:1fr 1fr;}.card{height:280px;}}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<nav class="nav">
    <a href="index.html" class="nav-brand"><span class="moon-icon">🌙</span> MOON</a>
    <a href="index.html" class="nav-link">⬅ رجوع إلى المملكة</a>
</nav>
<h2 class="page-title">⚔️ نقابات اثي</h2>
<div class="cards">
    <div class="card" style="--bg:url('./zawfan.jfif')"><span class="rank">زوفان</span><h3>دريـفـت</h3><span class="icon">🎻</span></div>
    <div class="card" style="--bg:url('./chinwa.jfif')"><span class="rank">شينوا</span><h3>تـاكـومـي</h3><span class="icon">🔰</span></div>
    <div class="card" style="--bg:url('./shaghr12.jfif')"><span class="rank">شاغر</span><h3>ثرونز</h3><span class="icon">🐉</span></div>
</div>
<div class="falling-icons" id="fallingIcons"></div>
<script>
(function(){const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let w,h,stars=[];const N=innerWidth<768?80:160;function resize(){w=c.width=innerWidth;h=c.height=innerHeight;}function create(){stars=[];for(let i=0;i<N;i++)stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.3,speed:Math.random()*0.3+0.05,phase:Math.random()*Math.PI*2});}function draw(t){ctx.clearRect(0,0,w,h);stars.forEach(s=>{s.y-=s.speed;if(s.y<-5){s.y=h+5;s.x=Math.random()*w;}const tw=0.5+0.5*Math.sin(t*0.002+s.phase);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${tw*0.7})`;ctx.fill();});requestAnimationFrame(draw);}addEventListener('resize',()=>{resize();create();});resize();create();requestAnimationFrame(draw);})();
const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:0.1});
document.querySelectorAll('.card').forEach(el=>obs.observe(el));
const icons=["🎻","🔰","🐉","⚔️"];const container=document.getElementById("fallingIcons");const n=innerWidth<768?18:30;
for(let i=0;i<n;i++){const s=document.createElement("span");s.textContent=icons[Math.floor(Math.random()*icons.length)];s.style.left=Math.random()*100+"vw";s.style.animationDuration=(Math.random()*5+6)+"s";s.style.fontSize=(Math.random()*18+12)+"px";s.style.animationDelay=(Math.random()*8)+"s";container.appendChild(s);}
if(innerWidth>768){document.querySelectorAll('.card').forEach(card=>{card.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect();const x=((e.clientX-r.left)/r.width-0.5)*10;const y=((e.clientY-r.top)/r.height-0.5)*-10;card.style.transform=`translateY(-12px) scale(1.03) rotateY(${x}deg) rotateX(${y}deg)`;});card.addEventListener('mouseleave',()=>{card.style.transform='';});});}
document.querySelectorAll('.card').forEach(card=>{card.addEventListener('touchstart',function(){document.querySelectorAll('.card.touched').forEach(c=>{if(c!==this)c.classList.remove('touched');});this.classList.toggle('touched');},{passive:true});});
</script>
</body>
</html>
